user www-data;

worker_processes auto;

events {
	worker_connections 1024;
}

http {

	include mime.types;
	limit_req_zone $binary_remote_addr zone=mylimit:10m rate=5r/s;
	
	charset utf-8;
	source_charset utf-8;

	client_body_buffer_size 10K;
	client_max_body_size 10m;

	client_header_buffer_size 1k;

	client_body_timeout 12;
	client_header_timeout 12;

	keepalive_timeout 15;

	send_timeout 10;

	sendfile on;

	tcp_nopush on;

	server_tokens off;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
	
 
  server {
  	listen 80;
		server_name cctest.randmutual.co.za;

    proxy_busy_buffers_size	512k;
    proxy_buffers	4 512k;
 		proxy_buffer_size	256k;


		location / {
			if ( $request_method !~ ^(GET|OPTIONS|POST|PUT|PATCH|DELETE)$ ) {
				add_header Access-Control-Allow-Origin * always;
				add_header Allow "OPTIONS, POST, GET, PUT, PATCH, DELETE" always;
				return 405;
			}

			if ($request_method = 'OPTIONS') {
				add_header Access-Control-Allow-Origin * always;
				add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Clientid";
				add_header Access-Control-Allow-Methods "OPTIONS, POST, GET, PATCH, PUT, DELETE"; # crud
				add_header Access-Control-Max-Age 3600;
				return 204;
			}

			proxy_pass http://localhost:3003;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection 'upgrade';
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}

		location /api/ {
			if ( $request_method !~ ^(GET|OPTIONS|POST|PUT|PATCH|DELETE)$ ) {
				add_header Access-Control-Allow-Origin * always;
				add_header Allow "OPTIONS, POST, GET, PUT, PATCH, DELETE" always;
				return 405;
			}

			if ($request_method = 'OPTIONS') {
				add_header Access-Control-Allow-Origin * always;
				add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, Clientid";
				add_header Access-Control-Allow-Methods "OPTIONS, POST, GET, PATCH, PUT, DELETE"; # crud
				add_header Access-Control-Max-Age 3600;
				return 204;
			}

			proxy_pass http://localhost:3003;
			proxy_http_version 1.1;
			proxy_set_header Upgrade $http_upgrade;
			proxy_set_header Connection 'upgrade';
			proxy_set_header Host $host;
			proxy_cache_bypass $http_upgrade;
		}

		location ~/apirma/ {
			if ( $request_method !~ ^(GET|OPTIONS|POST|PUT|PATCH|DELETE)$ ) {
				add_header Access-Control-Allow-Origin * always;
